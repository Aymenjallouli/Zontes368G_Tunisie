services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-zontes}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-zontes_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./setup-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zontes} -d ${DB_NAME:-zontes_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-zontes}:${DB_PASSWORD}@db:5432/${DB_NAME:-zontes_db}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${FRONTEND_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
